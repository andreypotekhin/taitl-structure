services:
  spark35-master:
    image: structure-integration-pyspark35
    build:
      context: ${STRUCTURE_ROOT:-../..}
      dockerfile: infra/compose/images/pyspark/Dockerfile
      args:
        PYSPARK_VERSION: ${PYSPARK35_VERSION}
    command: >
      spark-class org.apache.spark.deploy.master.Master --host 0.0.0.0 --port 7077 --webui-port 8080
    ports:
      - "${SPARK35_MASTER_PORT}:7077"
      - "${SPARK35_MASTER_UI_PORT}:8080"

  spark35-worker:
    image: structure-integration-pyspark35
    build:
      context: ${STRUCTURE_ROOT:-../..}
      dockerfile: infra/compose/images/pyspark/Dockerfile
      args:
        PYSPARK_VERSION: ${PYSPARK35_VERSION}
    command: >
      spark-class org.apache.spark.deploy.worker.Worker spark://spark35-master:7077 --webui-port 8081
    depends_on:
      - spark35-master
    ports:
      - "${SPARK35_WORKER_UI_PORT}:8081"

  spark40-master:
    image: structure-integration-pyspark40
    build:
      context: ${STRUCTURE_ROOT:-../..}
      dockerfile: infra/compose/images/pyspark/Dockerfile
      args:
        PYSPARK_VERSION: ${PYSPARK40_VERSION}
    command: >
      spark-class org.apache.spark.deploy.master.Master --host 0.0.0.0 --port 7077 --webui-port 8080
    ports:
      - "${SPARK40_MASTER_PORT}:7077"
      - "${SPARK40_MASTER_UI_PORT}:8080"

  spark40-worker:
    image: structure-integration-pyspark40
    build:
      context: ${STRUCTURE_ROOT:-../..}
      dockerfile: infra/compose/images/pyspark/Dockerfile
      args:
        PYSPARK_VERSION: ${PYSPARK40_VERSION}
    command: >
      spark-class org.apache.spark.deploy.worker.Worker spark://spark40-master:7077 --webui-port 8081
    depends_on:
      - spark40-master
    ports:
      - "${SPARK40_WORKER_UI_PORT}:8081"

  structure-integration-pyspark35:
    image: structure-integration-pyspark35
    build:
      context: ${STRUCTURE_ROOT:-../..}
      dockerfile: infra/compose/images/pyspark/Dockerfile
      args:
        PYSPARK_VERSION: ${PYSPARK35_VERSION}
    command: >
      sh -lc "cd /tmp && python -m pytest /workspace/tests/integration --rootdir=/workspace
      -p no:cacheprovider --run-integration --integration-backend=pyspark35
      ${INTEGRATION_PYTEST_ARGS}
      "
    depends_on:
      - spark35-master
      - spark35-worker
    environment:
      STRUCTURE_EXPECTED_PYSPARK: ${PYSPARK35_VERSION}
      STRUCTURE_EXPECTED_SPARK: ${PYSPARK35_VERSION}
      STRUCTURE_INTEGRATION_BACKEND: pyspark35
      STRUCTURE_SPARK_MASTER: spark://spark35-master:7077
      STRUCTURE_SPARK35_MASTER: spark://spark35-master:7077
      STRUCTURE_SPARK40_MASTER: spark://spark40-master:7077
    volumes:
      - type: bind
        source: ${STRUCTURE_ROOT:-../..}
        target: /workspace
        read_only: true
      - type: bind
        source: ${STRUCTURE_ROOT:-../..}/.pytest-workspace-tmp/integration
        target: /workspace/.pytest-workspace-tmp/integration

  structure-integration-pyspark40:
    image: structure-integration-pyspark40
    build:
      context: ${STRUCTURE_ROOT:-../..}
      dockerfile: infra/compose/images/pyspark/Dockerfile
      args:
        PYSPARK_VERSION: ${PYSPARK40_VERSION}
    command: >
      sh -lc "cd /tmp && python -m pytest /workspace/tests/integration --rootdir=/workspace
      -p no:cacheprovider --run-integration --integration-backend=pyspark40
      ${INTEGRATION_PYTEST_ARGS}
      "
    depends_on:
      - spark40-master
      - spark40-worker
    environment:
      STRUCTURE_EXPECTED_PYSPARK: ${PYSPARK40_VERSION}
      STRUCTURE_EXPECTED_SPARK: ${PYSPARK40_VERSION}
      STRUCTURE_INTEGRATION_BACKEND: pyspark40
      STRUCTURE_SPARK_MASTER: spark://spark40-master:7077
      STRUCTURE_SPARK35_MASTER: spark://spark35-master:7077
      STRUCTURE_SPARK40_MASTER: spark://spark40-master:7077
    volumes:
      - type: bind
        source: ${STRUCTURE_ROOT:-../..}
        target: /workspace
        read_only: true
      - type: bind
        source: ${STRUCTURE_ROOT:-../..}/.pytest-workspace-tmp/integration
        target: /workspace/.pytest-workspace-tmp/integration
